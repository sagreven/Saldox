name: "Saldox EMS Bridge"
description: >-
  Brug tussen Saldox en je hardware. Pollt Sofar Solar HYD hybride inverters via
  Modbus-TCP of RS485 (USB-adapter) en exposed ze als Home Assistant sensors.
  Haalt EPEX-prijzen op via de Saldox API en toont ze als HA sensors + dashboard.
version: "0.3.2"
slug: saldox_ems_bridge
url: "https://github.com/sagreven/Saldox"
arch:
  - amd64
  - aarch64
  - armv7
init: false
hassio_api: true
homeassistant_api: true
host_network: true
uart: true
ingress: true
ingress_port: 8765
panel_icon: "mdi:solar-power-variant"
panel_title: "Saldox"
ports:
  8765/tcp: null
ports_description:
  8765/tcp: "Saldox command webhook"
options:
  modbus_connection_type: "tcp"
  modbus_host: "192.168.1.50"
  modbus_port: 502
  modbus_serial_port: "/dev/ttyUSB0"
  modbus_baudrate: 9600
  modbus_unit_id: 1
  modbus_poll_interval_seconds: 10
  ha_device_slug: "sofar_hyd"
  ha_friendly_name: "Sofar HYD"
  prices_slug: "saldox_price"
  prices_poll_minutes: 15
  saldox_api_url: ""
  saldox_api_token: ""
schema:
  modbus_connection_type: "list(tcp|serial)"
  modbus_host: "str?"
  modbus_port: "port?"
  modbus_serial_port: "str?"
  modbus_baudrate: "int?"
  modbus_unit_id: "int(1,247)?"
  modbus_poll_interval_seconds: "int(5,300)?"
  ha_device_slug: "str"
  ha_friendly_name: "str?"
  prices_slug: "str?"
  prices_poll_minutes: "int(5,720)?"
  saldox_api_url: "url?"
  saldox_api_token: "password?"
